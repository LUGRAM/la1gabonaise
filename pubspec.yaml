name: la1gabonaise
description: Plateforme de streaming gabonaise — Made in Gabon
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  dio: ^5.4.0
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  shared_preferences: ^2.2.3
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  pin_code_fields: ^8.0.1
  intl: ^0.19.0
  connectivity_plus: ^5.0.2
  lottie: ^3.1.0
  flutter_svg: ^2.0.9
  video_player: ^2.8.2
  chewie: ^1.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/